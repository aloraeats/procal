<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Production Yield Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      color: #2d3436;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      max-width: 860px;
      margin: 0 auto 24px auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-card h3 {
      font-size: 0.95rem;
      color: #2d3436;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .form-row input {
      flex: 1;
      min-width: 140px;
      padding: 10px 12px;
      border: 1px solid #dfe6e9;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      background: #f9f9f9;
      color: #2d3436;
      transition: border 0.2s;
    }

    .form-row input:focus {
      border-color: #00b894;
      background: #fff;
    }

    .form-row input::placeholder {
      color: #b2bec3;
    }

    .btn-add {
      padding: 10px 22px;
      background: #00b894;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #00997a; }

    .btn-clear {
      padding: 10px 22px;
      background: #fff;
      color: #d63031;
      border: 1px solid #d63031;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      background: #d63031;
      color: #fff;
    }

    /* ── TABLE CARD ── */
    .table-card {
      background: #fff;
      border-radius: 10px;
      max-width: 860px;
      margin: 0 auto 24px auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .table-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .table-card-header h3 {
      font-size: 0.95rem;
      color: #2d3436;
      font-weight: 600;
    }

    .row-count {
      font-size: 0.8rem;
      background: #00b894;
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* ── TABLE ── */
    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr {
      background: #f8f9fa;
      border-bottom: 2px solid #e0e0e0;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #636e72;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    thead th:not(:first-child) {
      text-align: center;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #f8fffe;
    }

    tbody td {
      padding: 14px 16px;
      color: #2d3436;
      text-align: center;
    }

    tbody td:first-child {
      text-align: left;
      font-weight: 600;
      color: #2d3436;
    }

    tbody td.total-col {
      font-weight: 700;
      color: #00b894;
    }

    /* DELETE BTN */
    .btn-del {
      background: none;
      border: none;
      color: #b2bec3;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .btn-del:hover {
      color: #d63031;
      background: #fff5f5;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #b2bec3;
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* ── SUMMARY CARD ── */
    .summary-card {
      background: #fff;
      border-radius: 10px;
      max-width: 860px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .summary-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .summary-card-header h3 {
      font-size: 0.95rem;
      color: #2d3436;
      font-weight: 600;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .summary-table tr {
      border-bottom: 1px solid #f0f0f0;
    }

    .summary-table tr:last-child {
      border-bottom: none;
      background: #f0faf7;
    }

    .summary-table td {
      padding: 12px 20px;
      color: #2d3436;
    }

    .summary-table td:last-child {
      text-align: right;
      font-weight: 700;
      color: #00b894;
    }

    .summary-table tr:last-child td {
      font-size: 1rem;
      font-weight: 700;
      color: #00997a;
    }

    .summary-table tr:last-child td:first-child {
      color: #2d3436;
    }

    @media (max-width: 600px) {
      .form-row input { min-width: 100%; }
      .btn-add, .btn-clear { width: 100%; }
    }
  </style>
</head>
<body>

  <h1>Production Yield Calculator</h1>
  <p class="subtitle">Track how much finished product each raw material produces</p>

  <!-- FORM -->
  <div class="form-card">
    <h3>Add Raw Material</h3>
    <div class="form-row">
      <input type="text"   id="inProduct" placeholder="Raw Material (e.g. Beans)" />
      <input type="number" id="inBags"    placeholder="No. of Bags" min="1" />
      <input type="number" id="inYield"   placeholder="Yield Per Bag" min="1" />
      <input type="text"   id="inUnit"    placeholder="Unit (e.g. Balls)" />
      <button class="btn-add"   onclick="addRow()">+ Add</button>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <!-- MAIN TABLE -->
  <div class="table-card">
    <div class="table-card-header">
      <h3>Raw Materials & Output</h3>
      <span class="row-count" id="rowCount">0 items</span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Raw Material</th>
            <th>No. of Bags</th>
            <th>Yield Per Bag</th>
            <th>Unit</th>
            <th>Total Output</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6">
              <div class="empty-state">
                <div class="icon">📦</div>
                <p>No raw materials added yet. Start by adding one above.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- SUMMARY -->
  <br/>
  <div class="summary-card" id="summaryCard" style="display:none;">
    <div class="summary-card-header">
      <h3>Summary</h3>
    </div>
    <table class="summary-table" id="summaryTable">
    </table>
  </div>

  <script>
    let rows = [];
    let idCounter = 1;

    function addRow() {
      const product = document.getElementById('inProduct').value.trim();
      const bags    = parseFloat(document.getElementById('inBags').value);
      const yield_  = parseFloat(document.getElementById('inYield').value);
      const unit    = document.getElementById('inUnit').value.trim() || 'Units';

      if (!product)         { alert('Please enter a raw material name.'); return; }
      if (!bags  || bags  < 1) { alert('Please enter a valid number of bags.'); return; }
      if (!yield_ || yield_ < 1) { alert('Please enter a valid yield per bag.'); return; }

      rows.push({ id: idCounter++, product, bags, yield_, unit, total: bags * yield_ });

      document.getElementById('inProduct').value = '';
      document.getElementById('inBags').value    = '';
      document.getElementById('inYield').value   = '';
      document.getElementById('inUnit').value    = '';
      document.getElementById('inProduct').focus();

      render();
    }

    function deleteRow(id) {
      rows = rows.filter(r => r.id !== id);
      render();
    }

    function clearAll() {
      if (rows.length === 0) return;
      if (confirm('Clear all rows?')) { rows = []; idCounter = 1; render(); }
    }

    function render() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      document.getElementById('rowCount').textContent =
        rows.length + (rows.length === 1 ? ' item' : ' items');

      if (rows.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-state">
              <div class="icon">📦</div>
              <p>No raw materials added yet. Start by adding one above.</p>
            </div>
          </td></tr>`;
        document.getElementById('summaryCard').style.display = 'none';
        return;
      }

      rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.product}</td>
          <td>${r.bags}</td>
          <td>${r.yield_}</td>
          <td>${r.unit}</td>
          <td class="total-col">${r.total.toLocaleString()} ${r.unit}</td>
          <td>
            <button class="btn-del" onclick="deleteRow(${r.id})" title="Remove">✕</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Summary
      const summaryTable = document.getElementById('summaryTable');
      summaryTable.innerHTML = '';

      let grandTotal = 0;

      rows.forEach(r => {
        grandTotal += r.total;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.product}</td>
          <td>${r.bags} bags × ${r.yield_} = ${r.total.toLocaleString()} ${r.unit}</td>
        `;
        summaryTable.appendChild(tr);
      });

      const totalTr = document.createElement('tr');
      totalTr.innerHTML = `
        <td>Grand Total</td>
        <td>${grandTotal.toLocaleString()} Units</td>
      `;
      summaryTable.appendChild(totalTr);

      document.getElementById('summaryCard').style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') addRow();
    });
  </script>

</body>
</html>
